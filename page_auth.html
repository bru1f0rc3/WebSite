<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Авторизация</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        #authform {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
        }

        #authform h2 {
            margin-top: 0;
            text-align: center;
            color: #bb86fc;
        }

        #authform label {
            display: block;
            margin-bottom: 8px;
            color: #ffffff;
        }

        #authform input[id=authemail],
        #authform input[type="password"] {
            width: calc(100% - 20px);
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #333;
            border-radius: 4px;
            background-color: #2c2c2c;
            color: #ffffff;
        }

        #authform button[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #bb86fc;
            border: none;
            border-radius: 4px;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
        }

        #authform input[type="submit"]:hover {
            background-color: #9c66e0;
        }
    </style>
    <script src="src/app.ts"></script>
</head>
<body>
<form id="authform">
    <h2>Авторизация</h2>
    <input type="email" id="authemail" placeholder="Email" required>
    <input type="password" id="passwordauth" placeholder="Password" required>
    <button type="submit">Авторизация</button>
</form>
<script type="module" src="dist/app.js"></script>
</body>
</html>
